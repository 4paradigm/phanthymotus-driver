dji-mavic3e:
  image: __IMAGE__
  container_name: embodied-dji-mavic3e
  network_mode: host
  ipc: host
  privileged: true
  volumes:
    - /dev:/dev
    - /opt/phanthy-motus/data:/opt/phanthy-motus/data
    - /tmp/psdk_bridge.sock:/tmp/psdk_bridge.sock
  environment:
    - ROS_DOMAIN_ID=42
    - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    - PYTHONUNBUFFERED=1
  logging:
    driver: local
    options:
      max-size: "10m"
      max-file: "3"
  restart: unless-stopped
