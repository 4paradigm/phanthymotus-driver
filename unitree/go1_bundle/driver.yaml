id: go1-bundle-driver
name: Unitree Go1 Bundle (state + control)
category: driver
hardware_provider: unitree
hardware_model: "go1"
image_name: go1_bundle
port: 15704
mcp_url: "http://localhost:15704/mcp"
description: "Unitree Go1 (EDU) 状态+控制驱动（原始 unitree_legged_sdk）。本 bundle 共 21 张卡，合并为 4 个聚合文件：sensors.py（11 张：loco_state/battery/imu/feet/fall_alarm/obstacle_range/remote_controller/udp_diagnostics/odometry/joints/model）/ controllers.py（5 张：loco/body_pose/switch_gait/gesture/special_motion）/ ext_devices.py（4 张：beep/speaker/face_light/system_health）+ camera.py（RGB/深度/点云三合一）。传感卡：运动状态(loco_state) + 电池(battery) + IMU(imu) + 足端(feet) + 跌倒告警(fall_alarm) + 里程计(odometry) + 超声波避障(obstacle_range) + UDP 通信诊断(udp_diagnostics) + 腿关节(joints) + 无线遥控器(remote_controller) + 五机位视觉(camera, rgb/depth/pointcloud 三合一, front/chin/left/right/belly 可切换/多实例)；控制卡：基础运动(loco，三维速度+站立/姿态/身高) + 机身姿态/高度(body_pose，roll/pitch/yaw+机身高度偏移+抬脚高度偏移+复位) + 表演/表情(gesture，作揖/点头/跳舞等，异步) + 步态切换(switch_gait) + 官方特殊动作(special_motion，jump_yaw_left/straight_hand) + 头部扬声器(beep) + 头部扬声器远程麦克风播放(speaker，订阅 /remote_control/mic 播放) + 面部灯带(face_light) + 机器人整体状态/健康信息(system_health，action=robot_info)。资源卡：go1 URDF(model，供 joints 骨架渲染)。beep/speaker 的 Nano 后端由容器首启时的 deploy/nano_bootstrap.sh 自动部署。"
