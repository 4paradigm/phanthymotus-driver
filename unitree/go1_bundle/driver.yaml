description: "Unitree Go1 (EDU) 驱动 bundle — 状态卡：运动状态(loco_state)+电池(battery)；控制卡：原地转圈(spin，闭环读 IMU yaw 自停)；动作/传感卡：头部扬声器(beep)+前置RGB相机(camera_rgb)。beep/camera 的 Nano 后端由容器首启时的 deploy/nano_bootstrap.sh 自动部署，无需手动布 Nano。可作为新增卡片的开发蓝本，见 CONTRIBUTING.md。"
